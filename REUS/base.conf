structure           input/lipid_aqp_wi.psf
###coordinates        input/start%d.pdb

paraTypeCharmm	    on
parameters ../charmm36.nbfix/par_all36_prot.prm
parameters ../charmm36.nbfix/par_all36_na.prm
parameters ../charmm36.nbfix/par_all36_lipid.prm
parameters ../charmm36.nbfix/par_all36_carb.prm
parameters ../charmm36.nbfix/par_all36_cgenff.prm
parameters ../charmm36.nbfix/toppar_water_ions_cufix.str

# Force-Field Parameters
exclude             scaled1-4
1-4scaling          1.0
switching           on
switchdist           8
cutoff              10
pairlistdist        12


# Integrator Parameters
timestep            2.0  ;# 1fs/step (only if needed to finish quickly)
rigidBonds          all  
nonbondedFreq       1
fullElectFrequency  2  
stepspercycle       20


# Constant Temperature Control
langevin            on    ;# do langevin dynamicsgmail.google.com
langevinDamping     1.0     ;# damping coefficient (gamma) of 5/ps
langevinTemp        $temperature
#langevinFile        input/aero_LANGEVIN.pdb
#langevinCol         B
langevinHydrogen    off    ;# don't couple langevin bath to hydrogens

# Periodic Boundary Conditions  
#cellBasisVector1   61.5    0.   0.
#cellBasisVector2     0.   61.5   0.
#cellBasisVector3     0.    0    71.5
#cellOrigin        -16.06 -14.75 -12
wrapWater           on
wrapAll             on

# PME (for full-system periodic electrostatics)
PME                 yes
PMEGridSpacing      1.0

# Constant Pressure Control (variable volume)
#useGroupPressure      yes ;# needed for rigidBonds
#useFlexibleCell       no
#useConstantRatio      no

#langevinPiston        on
#langevinPistonTarget  1.01325 ;#  in bar -> 1 atm
#langevinPistonPeriod  300.  
#langevinPistonDecay   150.
#langevinPistonTemp    $temperature
# use SMD, v=0, to fix the mem center-of-mass 

if {0} {
     SMD            on
     SMDFile        input/lipid_HPC_wat_ions_smd.pdb
     SMDk            1.0
     SMDk2          0.0
     SMDVel         0.0
     SMDDir         0 0 1
     SMDOutputFreq  10000
                   }

if {0} {
constraints                     on
consKCol                        B
consRef                         input/LIC_WI_smd.pdb
consKFile                       input/LIC_WI_smd.pdb
constraintScaling               1
}


if {0} {
set volts   1.0
set length   84.8869
set field [expr $volts*-1.0*23.0609/$length]
eFieldOn                yes
eField                  0 0 $field
}
colvars              on
colvarsConfig        US-Z.in
#minimize 4800
